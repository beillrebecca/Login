<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Recomen - ログイン</title>
  <link href="https://fonts.googleapis.com/css2?family=Galada&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="login-container">
  <div class="login-box">

    <div class="logo">Recomen</div>

    <input type="text" id="loginInput" placeholder="ユーザーネームまたはメール/電話">
    <input type="password" id="loginPassword" placeholder="パスワード">

    <button id="loginBtn">ログイン</button>
    <button id="guestBtn">ゲストログイン</button>

    <p id="goSignup">新規登録はこちら</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
